version: "3.8"
services:
  db:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentis
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

