version: "3.8"
services:
  mentis-db:
    image: postgres:15
    container_name: mentis-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mentis
    ports:
      - "5432:5432"
    volumes:
      - mentis_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: development
    container_name: mentis-backend
    restart: on-failure
    ports:
      - "4000:4000"
    env_file:
      - ./server/.env.docker
    volumes:
      - ./server:/usr/src/app:cached
      - /usr/src/app/node_modules
    depends_on:
      mentis-db:
        condition: service_healthy
    command: ["npm", "run", "dev"]

volumes:
  mentis_db_data:
